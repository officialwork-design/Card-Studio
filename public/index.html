<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container-fluid gap-2">
      <span class="navbar-brand fw-bold">Card Studio</span>
      <div class="d-flex flex-wrap gap-2 ms-auto">
        <button id="undoBtn" class="btn btn-outline-secondary btn-sm">戻す</button>
        <button id="redoBtn" class="btn btn-outline-secondary btn-sm">進む</button>
        <button id="saveLocalBtn" class="btn btn-primary btn-sm">ブラウザ保存</button>
        <button id="exportJsonBtn" class="btn btn-outline-primary btn-sm">JSON保存</button>
        <label class="btn btn-outline-primary btn-sm mb-0" for="importJsonInput">JSON読込</label>
        <input id="importJsonInput" type="file" accept="application/json,.json" class="d-none">
        <button id="previewBtn" class="btn btn-outline-dark btn-sm">プレビュー</button>
        <button id="downloadPngBtn" class="btn btn-outline-success btn-sm">PNG</button>
        <button id="downloadSvgBtn" class="btn btn-outline-success btn-sm">SVG</button>
        <button id="downloadPdfBtn" class="btn btn-success btn-sm">PDF</button>
      </div>
    </div>
  </nav>

  <div id="alertArea" class="alert-area"></div>

  <main class="app-layout">
    <aside class="left-panel bg-light border-end">
      <section class="panel-section">
        <h6 class="fw-bold">テンプレート</h6>
        <button id="blankTemplateBtn" class="btn btn-outline-secondary w-100 mb-2">白紙</button>
        <button id="simpleTemplateBtn" class="btn btn-outline-secondary w-100">シンプル</button>
      </section>

      <section class="panel-section">
        <h6 class="fw-bold">テキスト</h6>
        <button id="addTextBtn" class="btn btn-primary w-100">テキスト追加</button>
      </section>

      <section class="panel-section">
        <h6 class="fw-bold">画像</h6>
        <input id="imageInput" type="file" class="form-control form-control-sm" accept="image/png,image/jpeg,image/webp,image/svg+xml">
        <button id="addImageBtn" class="btn btn-outline-primary w-100 mt-2">画像追加</button>
        <p class="small text-muted mt-2 mb-0">画像はサーバー保存せず、ブラウザ内で読み込みます。</p>
      </section>

      <section class="panel-section">
        <h6 class="fw-bold">図形</h6>
        <button id="addRectBtn" class="btn btn-outline-dark w-100 mb-2">四角形</button>
        <button id="addCircleBtn" class="btn btn-outline-dark w-100">円</button>
      </section>

      <section class="panel-section">
        <h6 class="fw-bold">QRコード</h6>
        <input id="qrTextInput" class="form-control form-control-sm mb-2" placeholder="https://example.com">
        <button id="addQrBtn" class="btn btn-outline-dark w-100">QR追加</button>
      </section>

      <section class="panel-section">
        <h6 class="fw-bold">背景</h6>
        <input id="backgroundColorInput" type="color" class="form-control form-control-color" value="#ffffff">
        <button id="applyBackgroundBtn" class="btn btn-outline-secondary w-100 mt-2">背景色変更</button>
      </section>
    </aside>

    <section class="canvas-area">
      <div class="canvas-toolbar bg-white border-bottom">
        <div class="btn-group btn-group-sm" role="group" aria-label="面切り替え">
          <button id="frontSideBtn" class="btn btn-dark active">表面</button>
          <button id="backSideBtn" class="btn btn-outline-dark">裏面</button>
        </div>
        <div class="form-check form-switch ms-3">
          <input id="gridToggle" class="form-check-input" type="checkbox">
          <label class="form-check-label" for="gridToggle">グリッド</label>
        </div>
        <div class="form-check form-switch ms-3">
          <input id="snapToggle" class="form-check-input" type="checkbox" checked>
          <label class="form-check-label" for="snapToggle">スナップ</label>
        </div>
        <div class="small text-muted ms-auto">名刺サイズ比率 91mm × 55mm / 300dpi想定</div>
      </div>
      <div id="canvasWrapper" class="canvas-wrapper">
        <canvas id="cardCanvas" width="1075" height="650"></canvas>
      </div>
    </section>

    <aside class="right-panel bg-light border-start">
      <section class="panel-section">
        <h6 class="fw-bold">選択中要素</h6>
        <div id="noSelectionText" class="text-muted small">要素を選択してください。</div>
        <div id="propertyPanel" class="d-none">
          <label class="form-label mt-2">フォント</label>
          <select id="fontFamilyInput" class="form-select form-select-sm">
            <option value="Arial">Arial</option>
            <option value="Helvetica">Helvetica</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Yu Gothic">Yu Gothic</option>
            <option value="Hiragino Sans">Hiragino Sans</option>
            <option value="Noto Sans JP">Noto Sans JP</option>
          </select>

          <label class="form-label mt-2">サイズ</label>
          <input id="fontSizeInput" type="number" class="form-control form-control-sm" min="6" max="220" value="42">

          <label class="form-label mt-2">色</label>
          <input id="fillColorInput" type="color" class="form-control form-control-color" value="#111111">

          <label class="form-label mt-2">透明度</label>
          <input id="opacityInput" type="range" class="form-range" min="0" max="1" step="0.05" value="1">

          <div class="btn-group w-100 mt-2" role="group" aria-label="文字装飾">
            <button id="boldBtn" class="btn btn-outline-dark btn-sm">B</button>
            <button id="italicBtn" class="btn btn-outline-dark btn-sm">I</button>
            <button id="underlineBtn" class="btn btn-outline-dark btn-sm">U</button>
          </div>

          <label class="form-label mt-3">整列</label>
          <div class="btn-group w-100" role="group" aria-label="横整列">
            <button id="alignLeftBtn" class="btn btn-outline-secondary btn-sm">左</button>
            <button id="alignCenterBtn" class="btn btn-outline-secondary btn-sm">中央</button>
            <button id="alignRightBtn" class="btn btn-outline-secondary btn-sm">右</button>
          </div>
          <div class="btn-group w-100 mt-2" role="group" aria-label="縦整列">
            <button id="alignTopBtn" class="btn btn-outline-secondary btn-sm">上</button>
            <button id="alignMiddleBtn" class="btn btn-outline-secondary btn-sm">中</button>
            <button id="alignBottomBtn" class="btn btn-outline-secondary btn-sm">下</button>
          </div>

          <label class="form-label mt-3">レイヤー</label>
          <div class="btn-group w-100" role="group" aria-label="レイヤー操作">
            <button id="bringForwardBtn" class="btn btn-outline-secondary btn-sm">前面</button>
            <button id="sendBackwardBtn" class="btn btn-outline-secondary btn-sm">背面</button>
          </div>
          <div class="btn-group w-100 mt-2" role="group" aria-label="最前面最背面">
            <button id="bringToFrontBtn" class="btn btn-outline-secondary btn-sm">最前面</button>
            <button id="sendToBackBtn" class="btn btn-outline-secondary btn-sm">最背面</button>
          </div>

          <button id="duplicateBtn" class="btn btn-outline-primary w-100 mt-3">複製</button>
          <button id="deleteBtn" class="btn btn-outline-danger w-100 mt-2">削除</button>
        </div>
      </section>

      <section class="panel-section">
        <h6 class="fw-bold">ショートカット</h6>
        <div class="small text-muted">
          <div>⌘/Ctrl + S：ブラウザ保存</div>
          <div>⌘/Ctrl + Z：戻す</div>
          <div>⌘/Ctrl + Y：進む</div>
          <div>Delete / Backspace：削除</div>
          <div>⌘/Ctrl + D：複製</div>
        </div>
      </section>
    </aside>
  </main>

  <div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">プレビュー</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <h6>表面</h6>
              <img id="frontPreviewImage" class="img-fluid border rounded" alt="表面プレビュー">
            </div>
            <div class="col-md-6">
              <h6>裏面</h6>
              <img id="backPreviewImage" class="img-fluid border rounded" alt="裏面プレビュー">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
